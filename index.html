<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Pro Portal</title>
    <!-- hls.js от надежден CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/0.14.17/hls.min.js">
    </script>
    <style>
        :root {
            --bg: #0f172a;
            --sidebar: #1e293b;
            --accent: #00bcd4;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --border: #334155;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 360px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-shrink: 0;
        }
        .login-box {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            background: #0f172a;
        }
        .login-box.hidden {
            display: none;
        }

        input,
        button {
            width: 100%;
            padding: 10px;
            margin: 4px 0;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: white;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            background: var(--accent);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        button:hover {
            opacity: 0.85;
        }

        .tabs {
            display: flex;
            background: #2c2c2e;
            flex-shrink: 0;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .tab-btn.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            font-weight: bold;
        }

        .search-box {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .search-box input {
            width: 100%;
            padding: 8px 12px;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: white;
            border-radius: 6px;
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .item-row {
            padding: 12px;
            margin: 4px 0;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: 0.15s;
        }
        .item-row:hover {
            background: rgba(255, 255, 255, 0.08);
            border-left-color: var(--accent);
        }
        .back-btn {
            background: #475569;
            color: white;
            text-align: center;
            font-weight: bold;
        }

        .pagination-ctrls {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #0f172a;
            border-top: 1px solid var(--border);
            gap: 10px;
        }
        .page-btn {
            padding: 6px 12px;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            width: auto;
            margin: 0;
        }
        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .main-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            gap: 20px;
        }
        .video-wrapper {
            aspect-ratio: 16/9;
            max-height: 50vh;
            min-height: 280px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        .vod-meta {
            display: none;
            gap: 20px;
            background: var(--sidebar);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .vod-meta.visible {
            display: flex;
        }
        .vod-poster {
            width: 120px;
            height: 180px;
            object-fit: cover;
            border-radius: 6px;
            background: #2c2c2e;
            flex-shrink: 0;
        }

        .archive-section {
            display: none;
            background: var(--sidebar);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .archive-section.visible {
            display: block;
        }
        .archive-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .archive-btn {
            padding: 10px 14px;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            width: auto;
            margin: 0;
            font-size: 13px;
        }
        .archive-btn:hover {
            background: var(--accent);
            color: black;
            border-color: var(--accent);
        }

        .current-showbox {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid var(--accent);
            border-radius: 4px;
            font-size: 14px;
        }
        .list-container::-webkit-scrollbar {
            width: 6px;
        }
        .list-container::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        @media (max-width: 850px) {
            body {
                flex-direction: column;
                overflow-y: auto;
                height: auto;
            }
            .main-content {
                order: 1;
                width: 100%;
                padding: 10px;
                overflow-y: visible;
            }
            .video-wrapper {
                max-height: unset;
                min-height: 220px;
                height: 300px;
            }
            .sidebar {
                order: 2;
                width: 100%;
                height: 55vh;
                border-right: none;
                border-top: 1px solid var(--border);
            }
            .archive-controls {
                flex-direction: row;
                justify-content: space-between;
            }
            .archive-btn {
                flex: 1;
                min-width: 30%;
                text-align: center;
            }
            .vod-meta.visible {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .item-row {
                padding: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="login-box" id="loginBox">
            <input type="text" id="username" placeholder="Потребител">
            <input type="password" id="password" placeholder="Парола">
            <button onclick="loadXtreamData()">Влез и Зареди</button>
            <div id="statusMsg" style="color: #ffa726; font-size: 13px; margin-top: 6px;">Въведете данни.</div>
        </div>
        <div class="tabs">
            <button class="tab-btn active" id="tabLive" onclick="setTab('live')">ТВ</button>
            <button class="tab-btn" id="tabVod" onclick="setTab('vod')">Филми</button>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Търси...">
        </div>
        <div class="list-container" id="listContainer"></div>
        <div class="pagination-ctrls" id="paginationBox" style="display: none;">
            <button class="page-btn" id="prevPageBtn" onclick="changePage(-1)">◀ Предишни</button>
            <span id="pageIndicator" style="font-size: 13px; align-self: center; color: var(--muted);">1 / 1</span>
            <button class="page-btn" id="nextPageBtn" onclick="changePage(1)">Следващи ▶</button>
        </div>
    </div>

    <div class="main-content">
        <h2 id="nowPlaying" style="font-weight: 300; font-size: 20px;">Изберете съдържание</h2>

        <div class="video-wrapper">
            <video id="videoPlayer" controls autoplay playsinline></video>
        </div>

        <div class="vod-meta" id="vodMeta">
            <img id="vodPoster" class="vod-poster" src="" onerror="this.src='https://via.placeholder.com/120x180?text=Няма+Снимка'" />
            <div>
                <h3 id="vodTitle" style="color: var(--accent); margin-bottom: 8px;"></h3>
                <p id="vodPlot" style="font-size: 14px; color: var(--muted); line-height: 1.4;"></p>
            </div>
        </div>

        <div class="archive-section" id="archiveSection">
            <h3 style="color: #ff9800; font-size: 15px;">⏱️ Бързо връщане назад (Таймшифт)</h3>
            <div class="archive-controls">
                <button class="archive-btn" onclick="playArchiveMinutes(5)">-5 мин.</button>
                <button class="archive-btn" onclick="playArchiveMinutes(10)">-10 мин.</button>
                <button class="archive-btn" onclick="playArchiveMinutes(15)">-15 мин.</button>
                <button class="archive-btn" onclick="playArchiveMinutes(30)">-30 мин.</button>
                <button class="archive-btn" onclick="playArchiveMinutes(60)">-1 час</button>
                <button class="archive-btn" onclick="playArchiveMinutes(90)">-1.5 часа</button>
                <button class="archive-btn" onclick="playArchiveMinutes(120)">-2 часа</button>
            </div>
            <div class="current-showbox" id="currentShowBox">
                <b>В момента по ТВ:</b> <span id="currentShowName" style="color: var(--muted);">Зареждане...</span>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        // 1. КОНФИГУРАЦИЯ
        // ================================================================
        const serverUrl = "http://tvpro.burgasnet.com";

        // Автоматично определяне на API базовия път – работи и локално, и в интернет
        const apiBase = (() => {
            // Ако сме на Vercel, използваме относителен път
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                return '/api/tv';
            }
            // В интернет – използваме същия домейн + /api/tv
            return '/api/tv';
        })();

        console.log('📡 API базов път:', apiBase);

        let liveStreams = [],
            vodStreams = [],
            vodCategories = [];
        let currentTab = 'live',
            currentCatId = null;
        let activeItem = null;
        let currentPage = 1;
        const itemsPerPage = 20;
        let hlsInstance = null;

        // ================================================================
        // 2. ПОМОЩНИ
        // ================================================================
        function setStatus(msg, isError = false) {
            const el = document.getElementById('statusMsg');
            if (el) {
                el.textContent = msg;
                el.style.color = isError ? '#ef5350' : '#ffa726';
            }
        }

        function decodeBase64Cyrillic(base64Str) {
            try {
                const binary = atob(base64Str);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                return new TextDecoder('utf-8').decode(bytes);
            } catch (_) {
                return "Грешка при декодиране";
            }
        }

        // ================================================================
        // 3. ТАБОВЕ + ТЪРСАЧКА
        // ================================================================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tab = this.id === 'tabLive' ? 'live' : 'vod';
                setTab(tab);
            });
        });

        document.getElementById('searchInput').addEventListener('input', () => {
            currentPage = 1;
            renderList();
        });

        // ================================================================
        // 4. ЗАРЕЖДАНЕ НА ДАННИ
        // ================================================================
        async function loadXtreamData() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass) {
                setStatus('Попълнете потребител и парола!', true);
                return;
            }
            setStatus('⏳ Зареждане...');

            try {
                // Използваме динамичния API път
                const baseUrl = apiBase;

                const [liveResp, vodResp, catsResp] = await Promise.all([
                    fetch(`${baseUrl}?username=${user}&password=${pass}&action=get_live_streams`),
                    fetch(`${baseUrl}?username=${user}&password=${pass}&action=get_vod_streams`),
                    fetch(`${baseUrl}?username=${user}&password=${pass}&action=get_vod_categories`)
                ]);

                if (!liveResp.ok || !vodResp.ok || !catsResp.ok) {
                    const errText = await liveResp.text();
                    console.error('Грешка от сървъра:', errText);
                    throw new Error(`Грешка при комуникация с API-то. Статус: ${liveResp.status}`);
                }

                liveStreams = await liveResp.json();
                vodStreams = await vodResp.json();
                vodCategories = await catsResp.json();

                document.getElementById('loginBox').classList.add('hidden');
                setStatus(`✅ Заредени: ${liveStreams.length} канала, ${vodStreams.length} филма`, false);
                renderList();
            } catch (err) {
                console.error('Грешка при зареждане:', err);
                setStatus('❌ Грешка: ' + err.message, true);
            }
        }

        // ================================================================
        // 5. СМЯНА НА ТАБ
        // ================================================================
        function setTab(tab) {
            currentTab = tab;
            currentCatId = null;
            currentPage = 1;
            document.getElementById('searchInput').value = '';
            document.getElementById('tabLive').classList.toggle('active', tab === 'live');
            document.getElementById('tabVod').classList.toggle('active', tab === 'vod');
            renderList();
        }

        // ================================================================
        // 6. ИЗРИСУВАНЕ
        // ================================================================
        function renderList() {
            const container = document.getElementById('listContainer');
            const pagBox = document.getElementById('paginationBox');
            container.innerHTML = '';
            pagBox.style.display = 'none';

            const search = document.getElementById('searchInput').value.toLowerCase().trim();

            if (currentTab === 'live') {
                let filtered = liveStreams.filter(item => (item.name || '').toLowerCase().includes(search));
                if (!filtered.length) {
                    container.innerHTML = '<div style="color:var(--muted);padding:10px;">Няма намерени канали.</div>';
                    return;
                }

                filtered.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'item-row';
                    row.textContent = item.name || 'Без име';
                    row.onclick = () => selectItem(item, 'live');
                    container.appendChild(row);
                });
            } else {
                if (!currentCatId) {
                    let filteredCats = vodCategories.filter(cat => (cat.category_name || '').toLowerCase().includes(
                    search));
                    if (!filteredCats.length) {
                        container.innerHTML = '<div style="color:var(--muted);padding:10px;">Няма категории.</div>';
                        return;
                    }

                    filteredCats.forEach(cat => {
                        const row = document.createElement('div');
                        row.className = 'item-row';
                        row.textContent = `📁 ${cat.category_name}`;
                        row.onclick = () => {
                            currentCatId = cat.category_id;
                            currentPage = 1;
                            document.getElementById('searchInput').value = '';
                            renderList();
                        };
                        container.appendChild(row);
                    });
                } else {
                    const backRow = document.createElement('div');
                    backRow.className = 'item-row back-btn';
                    backRow.textContent = '⬅ НАЗАД КЪМ КАТЕГОРИИ';
                    backRow.onclick = () => {
                        currentCatId = null;
                        currentPage = 1;
                        document.getElementById('searchInput').value = '';
                        renderList();
                    };
                    container.appendChild(backRow);

                    let catMovies = vodStreams.filter(v => v.category_id == currentCatId);
                    let filtered = catMovies.filter(item => (item.name || item.title || '').toLowerCase().includes(
                    search));

                    if (!filtered.length) {
                        container.innerHTML += '<div style="color:var(--muted);padding:10px;">Няма филми.</div>';
                        return;
                    }

                    pagBox.style.display = 'flex';
                    const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
                    document.getElementById('pageIndicator').textContent = `${currentPage} / ${totalPages}`;
                    document.getElementById('prevPageBtn').disabled = (currentPage === 1);
                    document.getElementById('nextPageBtn').disabled = (currentPage === totalPages);

                    const startIdx = (currentPage - 1) * itemsPerPage;
                    const pageItems = filtered.slice(startIdx, startIdx + itemsPerPage);

                    pageItems.forEach(item => {
                        const row = document.createElement('div');
                        row.className = 'item-row';
                        row.textContent = `🎬 ${item.name || item.title || 'Без име'}`;
                        row.onclick = () => selectItem(item, 'vod');
                        container.appendChild(row);
                    });
                }
            }
        }

        // ================================================================
        // 7. СТРАНИЦИРАНЕ
        // ================================================================
        function changePage(direction) {
            currentPage += direction;
            renderList();
        }

        // ================================================================
        // 8. ИЗБОР НА ЕЛЕМЕНТ
        // ================================================================
        function selectItem(item, type) {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            activeItem = item;
            const name = item.name || item.title || 'Без име';
            document.getElementById('nowPlaying').textContent = name;

            document.getElementById('vodMeta').classList.remove('visible');
            document.getElementById('archiveSection').classList.remove('visible');

            if (type === 'live') {
                const url = `${serverUrl}/live/${user}/${pass}/${item.stream_id}.m3u8`;
                playVideo(url, 'hls');

                if (item.tv_archive === 1) {
                    document.getElementById('archiveSection').classList.add('visible');
                    loadCurrentEPG(user, pass, item.stream_id);
                }
            } else {
                document.getElementById('vodMeta').classList.add('visible');
                document.getElementById('vodTitle').textContent = name;
                document.getElementById('vodPoster').src = item.stream_icon || '';
                document.getElementById('vodPlot').textContent = item.plot || 'Няма налично описание.';

                const url = `${serverUrl}/movie/${user}/${pass}/${item.stream_id}.ts`;
                playVideo(url, 'native');
            }
        }

        // ================================================================
        // 9. EPG (В момента по ТВ)
        // ================================================================
        async function loadCurrentEPG(user, pass, streamId) {
            const targetLabel = document.getElementById('currentShowName');
            targetLabel.textContent = 'Зареждане...';

            try {
                const resp = await fetch(
                    `/api/tv?username=${user}&password=${pass}&action=get_short_epg&stream_id=${streamId}`
                );
                if (!resp.ok) throw new Error('EPG грешка');
                const data = await resp.json();

                if (data && data.epg_listings && data.epg_listings.length > 0) {
                    const now = Math.floor(Date.now() / 1000);
                    let currentProg = data.epg_listings.find(p => {
                        const start = parseInt(p.start_timestamp);
                        const end = parseInt(p.stop_timestamp);
                        return now >= start && now <= end;
                    });
                    if (!currentProg) currentProg = data.epg_listings[0];

                    if (currentProg && currentProg.title) {
                        let decodedTitle = currentProg.title;
                        try { decodedTitle = atob(currentProg.title); } catch (e) {}

                        const startHour = currentProg.start ? currentProg.start.split(' ')[1]?.substring(0, 5) : '';
                        const endHour = currentProg.end ? currentProg.end.split(' ')[1]?.substring(0, 5) : '';
                        const timeRange = (startHour && endHour) ? `[${startHour} - ${endHour}] ` : '';

                        targetLabel.textContent = timeRange + decodedTitle;
                        return;
                    }
                }
                targetLabel.textContent = 'Няма информация';
            } catch (e) {
                console.warn('EPG грешка:', e);
                targetLabel.textContent = 'Грешка при EPG';
            }
        }

        // ================================================================
        // 10. ПУСКАНЕ НА ВИДЕО (с hls.js + HTML5 резерв)
        // ================================================================
        function playVideo(url, type) {
            const video = document.getElementById('videoPlayer');

            // Унищожаваме старата hls инстанция
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }

            video.pause();
            video.removeAttribute('src');
            video.load();

            if (type === 'hls' && typeof Hls !== 'undefined' && Hls.isSupported()) {
                console.log('🎬 Пускане на HLS поток:', url);
                hlsInstance = new Hls({
                    maxMaxBufferLength: 10,
                    enableWorker: true,
                });
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(video);
                setStatus('▶️ Възпроизвеждане (HLS)');

                hlsInstance.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        console.warn('HLS фатална грешка:', data);
                        setStatus('❌ Грешка в HLS потока', true);
                        hlsInstance.recoverMediaError();
                    } else {
                        console.warn('HLS грешка (нефатална):', data);
                    }
                });

                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(e => console.log('Autoplay blocked:', e));
                });

            } else if (type === 'hls' && video.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari native HLS
                video.src = url;
                setStatus('▶️ Възпроизвеждане (Native HLS)');
                video.play().catch(e => console.log('Autoplay blocked:', e));
            } else {
                // Директно за MP4/TS
                video.src = url;
                setStatus('▶️ Възпроизвеждане (директно)');
                video.play().catch(e => console.log('Autoplay blocked:', e));
            }
        }

        // ================================================================
        // 11. АРХИВ (таймшифт)
        // ================================================================
        function playArchiveMinutes(minutesAgo) {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass || !activeItem) {
                setStatus('Липсват данни за архив.', true);
                return;
            }

            const targetDate = new Date(Date.now() - minutesAgo * 60000);
            const year = targetDate.getFullYear();
            const month = String(targetDate.getMonth() + 1).padStart(2, '0');
            const day = String(targetDate.getDate()).padStart(2, '0');
            const hours = String(targetDate.getHours()).padStart(2, '0');
            const mins = String(targetDate.getMinutes()).padStart(2, '0');

            const formattedTime = `${year}-${month}-${day}:${hours}-${mins}`;
            const archiveUrl = `${serverUrl}/timeshift/${user}/${pass}/120/${formattedTime}/${activeItem.stream_id}.m3u8`;

            const name = activeItem.name || activeItem.title || 'запис';
            document.getElementById('nowPlaying').textContent =
                `[АРХИВ -${minutesAgo} мин] ${name} (${hours}:${mins} ч.)`;

            console.log(`📼 Заявка за архив:`, archiveUrl);
            playVideo(archiveUrl, 'hls');
        }

        // ================================================================
        // 12. ENTER в полетата + старт
        // ================================================================
        document.getElementById('username').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loadXtreamData();
        });
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loadXtreamData();
        });

        document.addEventListener('DOMContentLoaded', () => {
            setStatus('Въведете данни и натиснете "Влез"');
            if (typeof Hls === 'undefined') {
                console.warn('⚠️ hls.js не е зареден!');
                setStatus('⚠️ hls.js не е зареден!', true);
            } else {
