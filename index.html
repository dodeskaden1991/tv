<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Pro Portal - Custom Timeshift</title>
    <!-- Задължителни библиотеки за стрийминг -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mux.js/6.3.0/mux.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --sidebar: #1e293b;
            --accent: #00bcd4;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --border: #334155;
            --panel-bg: #1c1c1e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 360px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; flex-shrink: 0; }
        
        .login-box { padding: 15px; border-bottom: 1px solid var(--border); background: #0f172a; transition: all 0.3s ease; }
        .login-box.hidden { display: none; }
        
        input, button { width: 100%; padding: 10px; margin: 4px 0; background: #2c2c2e; border: 1px solid #3a3a3c; color: white; border-radius: 6px; font-size: 14px; }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; border: none; }
        button:hover { opacity: 0.85; }
        
        .tabs { display: flex; background: #2c2c2e; flex-shrink: 0; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; transition: 0.2s; }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); font-weight: bold; }
        
        .search-box { padding: 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .search-box input { width: 100%; padding: 8px 12px; background: #2c2c2e; border: 1px solid #3a3a3c; color: white; border-radius: 6px; }

        .list-container { flex: 1; overflow-y: auto; padding: 10px; }
        .item-row { padding: 12px; margin: 4px 0; background: rgba(255,255,255,0.03); border-radius: 6px; cursor: pointer; border-left: 3px solid transparent; transition: 0.15s; }
        .item-row:hover { background: rgba(255,255,255,0.08); border-left-color: var(--accent); }
        .back-btn { background: #475569; color: white; text-align: center; font-weight: bold; }
        
        .main-content { flex: 1; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; gap: 20px; }
        .video-wrapper { aspect-ratio: 16/9; max-height: 50vh; min-height: 280px; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        video { width: 100%; height: 100%; display: block; }
        
        .vod-meta { display: none; gap: 20px; background: var(--sidebar); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .vod-meta.visible { display: flex; }
        .vod-poster { width: 120px; height: 180px; object-fit: cover; border-radius: 6px; background: #2c2c2e; flex-shrink: 0; }
        
        .archive-section { display: none; background: var(--sidebar); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .archive-section.visible { display: block; }
        .archive-controls { display: flex; gap: 10px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
        .archive-btn { padding: 10px 14px; background: #2c2c2e; border: 1px solid #3a3a3c; color: white; border-radius: 6px; cursor: pointer; width: auto; margin: 0; font-size: 13px; }
        .archive-btn:hover { background: var(--accent); color: black; border-color: var(--accent); }

        .current-showbox { margin-top: 15px; padding: 10px; background: rgba(255,255,255,0.02); border-left: 3px solid var(--accent); border-radius: 4px; font-size: 14px; }

        .list-container::-webkit-scrollbar { width: 6px; }
        .list-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="login-box" id="loginBox">
            <input type="text" id="username" placeholder="Потребител">
            <input type="password" id="password" placeholder="Парола">
            <button onclick="loadXtreamData()">Влез и Зареди</button>
            <div id="statusMsg" style="color: #ffa726; font-size: 13px; margin-top: 6px;">Въведете данни.</div>
        </div>
        <div class="tabs">
            <button class="tab-btn active" id="tabLive" onclick="setTab('live')">ТВ</button>
            <button class="tab-btn" id="tabVod" onclick="setTab('vod')">Филми</button>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Търси в текущия изглед...">
        </div>
        <div class="list-container" id="listContainer"></div>
    </div>

    <div class="main-content">
        <h2 id="nowPlaying" style="font-weight: 300; font-size: 20px;">Изберете съдържание</h2>
        <div class="video-wrapper">
            <video id="videoPlayer" controls autoplay playsinline></video>
        </div>
        
        <div class="vod-meta" id="vodMeta">
            <img id="vodPoster" class="vod-poster" src="" onerror="this.src='https://via.placeholder.com/120x180?text=Няма+Снимка'" />
            <div>
                <h3 id="vodTitle" style="color: var(--accent); margin-bottom: 8px;"></h3>
                <p id="vodPlot" style="font-size: 14px; color: var(--muted); line-height: 1.4;"></p>
            </div>
        </div>

        <div class="archive-section" id="archiveSection">
            <h3 style="color: #ff9800; font-size: 15px;">⏱️ Бързо връщане назад (Таймшифт)</h3>
            <div class="archive-controls">
                <button class="archive-btn" onclick="playArchiveMinutes(5)">-5 мин.</button>
                <button class="archive-btn" onclick="playArchiveMinutes(10)">-10 мин.</button>
                <button class="archive-btn" onclick="playArchiveMinutes(15)">-15 мин.</button>
                <button class="archive-btn" onclick="playArchiveMinutes(30)">-30 мин.</button>
                <button class="archive-btn" onclick="playArchiveMinutes(60)">-1 час</button>
                <button class="archive-btn" onclick="playArchiveMinutes(90)">-1.5 часа</button>
                <button class="archive-btn" onclick="playArchiveMinutes(120)">-2 часа</button>
            </div>
            <div class="current-showbox" id="currentShowBox">
                <b>В момента по ТВ:</b> <span id="currentShowName" style="color: var(--muted);">Няма информация</span>
            </div>
        </div>
    </div>

    <script>
        const serverUrl = "http://tvpro.burgasnet.com";
        let liveStreams = [], vodStreams = [], vodCategories = [];
        let currentTab = 'live', currentCatId = null;
        let activeItem = null;
        let hlsInstance = null;

        function setStatus(msg, isError = false) {
            const el = document.getElementById('statusMsg');
            if(el) {
                el.textContent = msg;
                el.style.color = isError ? '#ef5350' : '#ffa726';
            }
        }

        document.getElementById('searchInput').addEventListener('input', renderList);

        async function loadXtreamData() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass) {
                setStatus('Попълнете потребител и парола!', true);
                return;
            }
            setStatus('⏳ Зареждане...');
            try {
                const [liveResp, vodResp, catsResp] = await Promise.all([
                    fetch(`/api/tv?username=${user}&password=${pass}&action=get_live_streams`),
                    fetch(`/api/tv?username=${user}&password=${pass}&action=get_vod_streams`),
                    fetch(`/api/tv?username=${user}&password=${pass}&action=get_vod_categories`)
                ]);
                
                if (!liveResp.ok || !vodResp.ok || !catsResp.ok) throw new Error('Грешка при връзка със сървъра.');
                
                liveStreams = await liveResp.json();
                vodStreams = await vodResp.json();
                vodCategories = await catsResp.json();
                
                document.getElementById('loginBox').classList.add('hidden');
                setStatus(`Заредени успешно канали и филми.`, false);
                renderList();
            } catch (err) {
                setStatus('❌ Грешка: ' + err.message, true);
            }
        }

        function setTab(tab) {
            currentTab = tab;
            currentCatId = null;
            document.getElementById('searchInput').value = '';
            document.getElementById('tabLive').classList.toggle('active', tab === 'live');
            document.getElementById('tabVod').classList.toggle('active', tab === 'vod');
            renderList();
        }

        function renderList() {
            const container = document.getElementById('listContainer');
            container.innerHTML = '';
            const search = document.getElementById('searchInput').value.toLowerCase().trim();

            if (currentTab === 'live') {
                let filtered = liveStreams.filter(item => (item.name || '').toLowerCase().includes(search));
                if(!filtered.length) { container.innerHTML = '<div style="color:var(--muted);padding:10px;">Няма намерени канали.</div>'; return; }
                
                filtered.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'item-row';
                    row.textContent = item.name || 'Без име';
                    row.onclick = () => selectItem(item, 'live');
                    container.appendChild(row);
                });
            } else {
                if (!currentCatId) {
                    let filteredCats = vodCategories.filter(cat => (cat.category_name || '').toLowerCase().includes(search));
                    if(!filteredCats.length) { container.innerHTML = '<div style="color:var(--muted);padding:10px;">Няма категории.</div>'; return; }
                    
                    filteredCats.forEach(cat => {
                        const row = document.createElement('div');
                        row.className = 'item-row';
                        row.textContent = `📁 ${cat.category_name}`;
                        row.onclick = () => { currentCatId = cat.category_id; document.getElementById('searchInput').value = ''; renderList(); };
                        container.appendChild(row);
                    });
                } else {
                    const backRow = document.createElement('div');
                    backRow.className = 'item-row back-btn';
                    backRow.textContent = '⬅ НАЗАД КЪМ КАТЕГОРИИ';
                    backRow.onclick = () => { currentCatId = null; document.getElementById('searchInput').value = ''; renderList(); };
                    container.appendChild(backRow);

                    let catMovies = vodStreams.filter(v => v.category_id == currentCatId);
                    let filtered = catMovies.filter(item => (item.name || item.title || '').toLowerCase().includes(search));
                    
                    filtered.forEach(item => {
                        const row = document.createElement('div');
                        row.className = 'item-row';
                        row.textContent = item.name || item.title || 'Без име';
                        row.onclick = () => selectItem(item, 'vod');
                        container.appendChild(row);
                    });
                }
            }
        }

        function selectItem(item, type) {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            activeItem = item;
            const name = item.name || item.title || 'Без име';
            document.getElementById('nowPlaying').textContent = name;
            
            document.getElementById('vodMeta').classList.remove('visible');
            document.getElementById('archiveSection').classList.remove('visible');

            if (type === 'live') {
                const url = `${serverUrl}/live/${user}/${pass}/${item.stream_id}.m3u8`;
                playVideo(url, 'hls');
                
                if (item.tv_archive === 1) {
                    document.getElementById('archiveSection').classList.add('visible');
                    // Вадим текущото предаване директно от данните на стрийма, ако съществува такова
                    const currentShowName = item.epg_title || item.current_program || 'В момента се излъчва стрийм на живо';
                    document.getElementById('currentShowName').textContent = currentShowName;
                }
            } else {
                document.getElementById('vodMeta').classList.add('visible');
                document.getElementById('vodTitle').textContent = name;
                document.getElementById('vodPoster').src = item.stream_icon || '';
                document.getElementById('vodPlot').textContent = item.plot || 'Няма налично описание за този филм.';
                
                const url = `${serverUrl}/movie/${user}/${pass}/${item.stream_id}.ts`;
                playVideo(url, 'native');
            }
        }

        function playVideo(url, type) {
            const video = document.getElementById('videoPlayer');
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }
            video.pause();
            video.removeAttribute('src');
            video.load();

            if (type === 'hls' && typeof Hls !== 'undefined' && Hls.isSupported()) {
                hlsInstance = new Hls({ maxMaxBufferLength: 10, enableWorker: true });
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e => console.log(e)));
            } else {
                video.src = url;
                video.play().catch(e => console.log("Кликнете ръчно върху плеъра:", e));
            }
        }

        function playArchiveMinutes(minutesAgo) {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass || !activeItem) return;
            
            const d = new Date(Date.now() - minutesAgo * 60000);
            const f = d.getFullYear() + '-' + 
                      String(d.getMonth()+1).padStart(2,'0') + '-' + 
                      String(d.getDate()).padStart(2,'0') + ':' + 
                      String(d.getHours()).padStart(2,'0') + '-' + 
                      String(d.getMinutes()).padStart(2,'0');
            
            // 120 минути стандартна продължителност за таймшифт от текущата заявка нататък
            const url = `${serverUrl}/timeshift/${user}/${pass}/120/${f}/${activeItem.stream_id}.m3u8`;
            const name = activeItem.name || 'канал';
            document.getElementById('nowPlaying').textContent = `[АРХИВ -${minutesAgo} мин] ${name}`;
            playVideo(url, 'hls');
        }
    </script>
</body>
</html>
