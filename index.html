<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Pro Portal</title>

    <!-- Само hls.js (локален или от CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/0.14.17/hls.min.js"></script>

    <style>
        :root {
            --bg-dark: #121212;
            --panel-bg: #1c1c1e;
            --accent: #00bcd4;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #2c2c2e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== СТРАНИЧЕН ПАНЕЛ ===== */
        .sidebar {
            width: 360px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-shrink: 0;
            overflow: hidden;
        }
        .login-box {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        .login-box.hidden { display: none; }
        .login-box input, .login-box button {
            width: 100%;
            padding: 10px;
            margin: 4px 0;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: white;
            border-radius: 6px;
            font-size: 14px;
        }
        .login-box button {
            background: var(--accent);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        .login-box button:hover { opacity: 0.85; }
        .status-msg {
            color: #ffa726;
            font-size: 13px;
            min-height: 24px;
            padding-top: 6px;
        }

        .tabs {
            display: flex;
            background: #2c2c2e;
            flex-shrink: 0;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .tab-btn.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            font-weight: bold;
        }

        .search-box {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .search-box input {
            width: 100%;
            padding: 8px 12px;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: white;
            border-radius: 6px;
            font-size: 14px;
        }
        .search-box input::placeholder { color: var(--text-muted); }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* Категории (папки) за филми */
        .category-group { margin-bottom: 10px; }
        .category-header {
            padding: 8px 12px;
            background: #2c2c2e;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: var(--accent);
            display: flex;
            justify-content: space-between;
            user-select: none;
        }
        .category-header:hover { background: #3a3a3c; }
        .category-items {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.3s ease;
        }
        .category-items.open { max-height: 5000px; }

        .item-row {
            padding: 12px;
            margin: 4px 0;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: 0.15s;
        }
        .item-row:hover {
            background: rgba(255,255,255,0.08);
            border-left-color: var(--accent);
        }
        .item-title {
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .epg-mini {
            font-size: 11px;
            color: var(--accent);
            margin-top: 4px;
        }

        /* ===== ОСНОВНА ЗОНА ===== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            gap: 15px;
        }

        /* ===== ВИДЕО ПЛЕЪР ===== */
        .video-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            max-height: 55vh;
            min-height: 280px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        @supports not (aspect-ratio: 1/1) {
            .video-wrapper { height: 400px; }
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
        }

        /* ===== МЕТАДАННИ ЗА ФИЛМИ ===== */
        .vod-meta {
            display: none;
            gap: 20px;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .vod-meta.visible { display: flex; }
        .vod-poster {
            width: 120px;
            height: 180px;
            object-fit: cover;
            border-radius: 6px;
            background: #2c2c2e;
            flex-shrink: 0;
        }
        .vod-info-text h3 {
            margin: 0 0 8px 0;
            color: var(--accent);
            font-size: 18px;
        }
        .vod-info-text p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* ===== АРХИВ (таймшифт) ===== */
        .archive-section {
            display: none;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .archive-section.visible { display: block; }
        .archive-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .archive-btn {
            padding: 10px 14px;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.15s;
        }
        .archive-btn:hover {
            background: var(--accent);
            color: black;
            border-color: var(--accent);
        }
        .current-showbox {
            margin-top: 12px;
            padding: 10px;
            background: rgba(0, 188, 212, 0.05);
            border-left: 3px solid var(--accent);
            border-radius: 4px;
            font-size: 14px;
        }

        /* ===== АДАПТИВЕН ===== */
        @media (max-width: 850px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .main-content { order: 1; width: 100%; padding: 10px; overflow-y: visible; }
            .video-wrapper { max-height: unset; min-height: 220px; height: 300px; }
            .sidebar { order: 2; width: 100%; height: 55vh; border-right: none; border-top: 1px solid var(--border-color); }
            .archive-controls { flex-direction: row; justify-content: space-between; }
            .archive-btn { flex: 1; min-width: 30%; text-align: center; }
            .vod-meta.visible { flex-direction: column; align-items: center; text-align: center; }
            .item-row { padding: 14px; }
        }

        .list-container::-webkit-scrollbar { width: 6px; }
        .list-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
        .list-container::-webkit-scrollbar-track { background: var(--panel-bg); }
    </style>
</head>
<body>

    <!-- ===== СТРАНИЧЕН ПАНЕЛ ===== -->
    <div class="sidebar">
        <div class="login-box" id="loginBox">
            <input type="text" id="username" placeholder="Потребител">
            <input type="password" id="password" placeholder="Парола">
            <button onclick="loadXtreamData()">Влез и Зареди</button>
            <div class="status-msg" id="statusMsg">Въведете данни.</div>
        </div>
        <div class="tabs">
            <button class="tab-btn active" data-tab="live">ТВ</button>
            <button class="tab-btn" data-tab="vod">Филми</button>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Търси...">
        </div>
        <div class="list-container" id="listContainer"></div>
    </div>

    <!-- ===== ОСНОВНА ЗОНА ===== -->
    <div class="main-content">
        <h2 id="nowPlaying" style="font-weight:300; font-size:20px;">Изберете съдържание</h2>

        <div class="video-wrapper">
            <video id="videoPlayer" controls playsinline></video>
        </div>

        <div class="vod-meta" id="vodMeta">
            <img id="vodPoster" class="vod-poster" src="" onerror="this.src='https://via.placeholder.com/120x180?text=Няма+Снимка'" />
            <div class="vod-info-text">
                <h3 id="vodTitle"></h3>
                <p id="vodPlot"></p>
                <p id="vodCast" style="font-size:12px; color:#888; margin-top:10px;"></p>
            </div>
        </div>

        <div class="archive-section" id="archiveSection">
            <h3 style="color:#ff9800; font-size:15px;">⏱️ Бързо връщане назад (Таймшифт)</h3>
            <div class="archive-controls">
                <button class="archive-btn" onclick="playArchiveMinutes(5)">-5 мин.</button>
                <button class="archive-btn" onclick="playArchiveMinutes(10)">-10 мин.</button>
                <button class="archive-btn" onclick="playArchiveMinutes(15)">-15 мин.</button>
                <button class="archive-btn" onclick="playArchiveMinutes(30)">-30 мин.</button>
                <button class="archive-btn" onclick="playArchiveMinutes(60)">-1 час</button>
                <button class="archive-btn" onclick="playArchiveMinutes(90)">-1.5 часа</button>
                <button class="archive-btn" onclick="playArchiveMinutes(120)">-2 часа</button>
            </div>
            <div class="current-showbox">
                <b>В момента по ТВ:</b> <span id="currentShowName" style="color:#fff;">Зареждане...</span>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        // 1. КОНФИГУРАЦИЯ
        // ================================================================
        const serverUrl = "http://tvpro.burgasnet.com";
        let currentTab = 'live';
        let activeItem = null;
        let liveStreams = [];
        let vodStreams = [];
        let vodCategories = {};
        let hlsInstance = null;

        // ================================================================
        // 2. ПОМОЩНИ
        // ================================================================
        function setStatus(msg, isError = false) {
            const el = document.getElementById('statusMsg');
            if (el) {
                el.textContent = msg;
                el.style.color = isError ? '#ef5350' : '#ffa726';
            }
        }

        function decodeBase64Cyrillic(base64Str) {
            try {
                const binary = atob(base64Str);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                return new TextDecoder('utf-8').decode(bytes);
            } catch (_) {
                return "Грешка при декодиране";
            }
        }

        // ================================================================
        // 3. ТАБОВЕ + ТЪРСАЧКА
        // ================================================================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tab = this.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentTab = tab;
                renderList();
            });
        });

        document.getElementById('searchInput').addEventListener('input', renderList);

        // ================================================================
        // 4. ЗАРЕЖДАНЕ НА ДАННИ
        // ================================================================
        async function loadXtreamData() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass) {
                setStatus('Попълнете потребител и парола!', true);
                return;
            }

            const container = document.getElementById('listContainer');
            container.innerHTML = '⏳ Зареждане...';
            setStatus('Свързване...');

            try {
                const [liveResp, vodResp, catResp] = await Promise.all([
                    fetch(`/api/tv?username=${user}&password=${pass}&action=get_live_streams`),
                    fetch(`/api/tv?username=${user}&password=${pass}&action=get_vod_streams`),
                    fetch(`/api/tv?username=${user}&password=${pass}&action=get_vod_categories`)
                ]);

                if (!liveResp.ok || !vodResp.ok || !catResp.ok) throw new Error('Грешка при връзка със сървъра.');

                liveStreams = await liveResp.json();
                vodStreams = await vodResp.json();
                const cats = await catResp.json();

                if (Array.isArray(cats)) {
                    vodCategories = {};
                    cats.forEach(c => {
                        vodCategories[c.category_id] = c.category_name;
                    });
                }

                if (!Array.isArray(liveStreams) || !Array.isArray(vodStreams)) {
                    throw new Error('Невалиден отговор от сървъра');
                }

                // Добавяме имена на категории към филмите
                vodStreams.forEach(item => {
                    if (item.category_id && vodCategories[item.category_id]) {
                        item.category_name = vodCategories[item.category_id];
                    }
                });

                setStatus(`Заредени: ${liveStreams.length} ТВ канала, ${vodStreams.length} филма`);
                document.getElementById('loginBox').classList.add('hidden');
                renderList();

            } catch (err) {
                console.error(err);
                container.innerHTML = '❌ Грешка при зареждане на данни.';
                setStatus('Грешка: ' + err.message, true);
            }
        }

        // ================================================================
        // 5. ИЗРИСУВАНЕ
        // ================================================================
        function renderList() {
            const container = document.getElementById('listContainer');
            container.innerHTML = '';

            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            let data = currentTab === 'live' ? liveStreams : vodStreams;

            if (!Array.isArray(data) || data.length === 0) {
                container.innerHTML =
                    '<div style="color:var(--text-muted);text-align:center;margin-top:20px;">Няма намерени елементи.</div>';
                return;
            }

            let filtered = data;
            if (searchTerm) {
                filtered = data.filter(item => {
                    const name = (item.name || item.title || '').toLowerCase();
                    return name.includes(searchTerm);
                });
            }

            if (filtered.length === 0) {
                container.innerHTML =
                    '<div style="color:var(--text-muted);text-align:center;margin-top:20px;">Няма резултати за "' + searchTerm + '"</div>';
                return;
            }

            if (currentTab === 'vod') {
                // Филми – групиране по категории
                const groups = {};
                filtered.forEach(item => {
                    const cat = item.category_name || 'Без категория';
                    if (!groups[cat]) groups[cat] = [];
                    groups[cat].push(item);
                });

                const sortedCategories = Object.keys(groups).sort();
                sortedCategories.forEach(cat => {
                    const groupDiv = document.createElement('div');
                    groupDiv.className = 'category-group';

                    const header = document.createElement('div');
                    header.className = 'category-header';
                    header.innerHTML = `<span>${cat}</span><span>${groups[cat].length}</span>`;
                    header.addEventListener('click', function() {
                        const items = this.nextElementSibling;
                        items.classList.toggle('open');
                    });
                    groupDiv.appendChild(header);

                    const itemsDiv = document.createElement('div');
                    itemsDiv.className = 'category-items open';
                    groups[cat].forEach(item => {
                        const row = createItemRow(item);
                        itemsDiv.appendChild(row);
                    });
                    groupDiv.appendChild(itemsDiv);
                    container.appendChild(groupDiv);
                });
            } else {
                // ТВ – само списък
                filtered.forEach(item => {
                    const row = createItemRow(item);
                    container.appendChild(row);
                });
            }

            // Зареждаме EPG за ТВ канали
            if (currentTab === 'live') {
                filtered.forEach(item => {
                    loadMiniEPG(item.stream_id);
                });
            }
        }

        function createItemRow(item) {
            const row = document.createElement('div');
            row.className = 'item-row';
            const name = item.name || item.title || 'Без име';
            row.innerHTML = `
                <div class="item-title"><span>${name}</span></div>
                <div class="epg-mini" id="epg-${item.stream_id}"></div>
            `;
            row.addEventListener('click', () => selectItem(item));
            return row;
        }

        // ================================================================
        // 6. МИНИ-EPG
        // ================================================================
        async function loadMiniEPG(streamId) {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass) return;

            try {
                const resp = await fetch(
                    `/api/tv?username=${user}&password=${pass}&action=get_short_epg&stream_id=${streamId}`
                );
                const data = await resp.json();
                const el = document.getElementById(`epg-${streamId}`);
                if (el && data && data.epg_listings && data.epg_listings.length > 0) {
                    const title = decodeBase64Cyrillic(data.epg_listings[0].title);
                    el.textContent = `Сега: ${title}`;
                } else if (el) {
                    el.textContent = 'Няма EPG';
                }
            } catch (_) {
                const el = document.getElementById(`epg-${streamId}`);
                if (el) el.textContent = 'Грешка';
            }
        }

        // ================================================================
        // 7. ИЗБОР НА ЕЛЕМЕНТ
        // ================================================================
        function selectItem(item) {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass) {
                setStatus('Моля, въведете потребител и парола!', true);
                return;
            }

            activeItem = item;
            const name = item.name || item.title || 'Без име';
            document.getElementById('nowPlaying').textContent = name;

            document.getElementById('vodMeta').classList.remove('visible');
            document.getElementById('archiveSection').classList.remove('visible');

            if (window.innerWidth <= 850) {
                document.getElementById('nowPlaying').scrollIntoView({ behavior: 'smooth' });
            }

            if (currentTab === 'live') {
                const streamUrl = `${serverUrl}/live/${user}/${pass}/${item.stream_id}.m3u8`;
                playVideo(streamUrl, 'hls');

                if (item.tv_archive === 1) {
                    document.getElementById('archiveSection').classList.add('visible');
                    loadCurrentEPG(user, pass, item.stream_id);
                }
            } else {
                document.getElementById('vodMeta').classList.add('visible');
                document.getElementById('vodTitle').textContent = name;
                document.getElementById('vodPoster').src = item.stream_icon || '';
                document.getElementById('vodPlot').textContent = item.plot || 'Няма описание.';
                document.getElementById('vodCast').textContent =
                    `В ролите: ${item.cast || 'Неизвестни'}`;

                const movieUrl = `${serverUrl}/movie/${user}/${pass}/${item.stream_id}.ts`;
                playVideo(movieUrl, 'native');
            }
        }

        // ================================================================
        // 8. EPG за избрания канал
        // ================================================================
        async function loadCurrentEPG(user, pass, streamId) {
            const targetLabel = document.getElementById('currentShowName');
            targetLabel.textContent = 'Зареждане...';

            try {
                const resp = await fetch(
                    `/api/tv?username=${user}&password=${pass}&action=get_short_epg&stream_id=${streamId}`
                );
                const data = await resp.json();

                if (data && data.epg_listings && data.epg_listings.length > 0) {
                    const now = Math.floor(Date.now() / 1000);
                    let currentProg = data.epg_listings.find(p => {
                        const start = parseInt(p.start_timestamp);
                        const end = parseInt(p.stop_timestamp);
                        return now >= start && now <= end;
                    });
                    if (!currentProg) currentProg = data.epg_listings[0];

                    if (currentProg && currentProg.title) {
                        let decodedTitle = currentProg.title;
                        try { decodedTitle = atob(currentProg.title); } catch (e) {}

                        const startHour = currentProg.start ? currentProg.start.split(' ')[1]?.substring(0, 5) : '';
                        const endHour = currentProg.end ? currentProg.end.split(' ')[1]?.substring(0, 5) : '';
                        const timeRange = (startHour && endHour) ? `[${startHour} - ${endHour}] ` : '';

                        targetLabel.textContent = timeRange + decodedTitle;
                        return;
                    }
                }
                targetLabel.textContent = 'Няма информация';
            } catch (e) {
                console.warn('EPG грешка:', e);
                targetLabel.textContent = 'Грешка при EPG';
            }
        }

        // ================================================================
        // 9. ПУСКАНЕ НА ВИДЕО (hls.js + HTML5)
        // ================================================================
        function playVideo(url, type) {
            const video = document.getElementById('videoPlayer');

            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }

            video.pause();
            video.removeAttribute('src');
            video.load();

            if (type === 'hls' && typeof Hls !== 'undefined' && Hls.isSupported()) {
                hlsInstance = new Hls({
                    maxMaxBufferLength: 10,
                    enableWorker: true,
                });
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(video);
                setStatus('▶️ Възпроизвеждане (HLS)');

                hlsInstance.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        console.warn('HLS фатална грешка:', data);
                        setStatus('❌ Грешка в HLS потока', true);
                        hlsInstance.recoverMediaError();
                    } else {
                        console.warn('HLS грешка (нефатална):', data);
                    }
                });

            } else if (type === 'hls' && video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                setStatus('▶️ Възпроизвеждане (Native HLS)');
            } else {
                video.src = url;
                setStatus('▶️ Възпроизвеждане (директно)');
            }

            video.play().catch(e => {
                console.warn('Autoplay blocked:', e);
                setStatus('⚠️ Автоплей блокиран – натиснете "Play"', true);
            });
        }

        // ================================================================
        // 10. АРХИВ (таймшифт)
        // ================================================================
        function playArchiveMinutes(minutesAgo) {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass || !activeItem) {
                setStatus('Липсват данни за архив.', true);
                return;
            }

            const targetDate = new Date(Date.now() - minutesAgo * 60000);
            const year = targetDate.getFullYear();
            const month = String(targetDate.getMonth() + 1).padStart(2, '0');
            const day = String(targetDate.getDate()).padStart(2, '0');
            const hours = String(targetDate.getHours()).padStart(2, '0');
            const mins = String(targetDate.getMinutes()).padStart(2, '0');

            const formattedTime = `${year}-${month}-${day}:${hours}-${mins}`;
            const archiveUrl = `${serverUrl}/timeshift/${user}/${pass}/120/${formattedTime}/${activeItem.stream_id}.m3u8`;

            const name = activeItem.name || activeItem.title || 'запис';
            document.getElementById('nowPlaying').textContent =
                `[АРХИВ -${minutesAgo} мин] ${name} (${hours}:${mins} ч.)`;

            console.log(`Заявка за архив (-${minutesAgo} мин):`, archiveUrl);
            playVideo(archiveUrl, 'hls');
        }

        // ================================================================
        // 11. ENTER + СТАРТ
        // ================================================================
        document.getElementById('username').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loadXtreamData();
        });
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loadXtreamData();
        });

        document.addEventListener('DOMContentLoaded', () => {
            setStatus('Въведете данни и натиснете "Влез"');
            if (typeof Hls === 'undefined') {
                setStatus('⚠️ hls.js не е зареден!', true);
            } else {
                console.log('✅ hls.js зареден успешно.');
            }
        });

        console.log('✅ TV Pro Portal зареден.');
    </script>
</body>
</html>
