<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Pro Portal</title>
    
    <!-- Зареждане на локалния скрипт от Screenshot 2026-07-05 111446.png -->
    <script src="./h265web.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --sidebar: #1e293b;
            --accent: #00bcd4;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --border: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 360px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; flex-shrink: 0; }
        .login-box { padding: 15px; border-bottom: 1px solid var(--border); background: #0f172a; }
        .login-box.hidden { display: none; }
        
        input, button { width: 100%; padding: 10px; margin: 4px 0; background: #2c2c2e; border: 1px solid #3a3a3c; color: white; border-radius: 6px; font-size: 14px; }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; border: none; }
        button:hover { opacity: 0.85; }
        
        .tabs { display: flex; background: #2c2c2e; flex-shrink: 0; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; transition: 0.2s; }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); font-weight: bold; }
        
        .search-box { padding: 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .search-box input { width: 100%; padding: 8px 12px; background: #2c2c2e; border: 1px solid #3a3a3c; color: white; border-radius: 6px; }

        .list-container { flex: 1; overflow-y: auto; padding: 10px; }
        .item-row { padding: 12px; margin: 6px 0; background: rgba(255,255,255,0.03); border-radius: 6px; cursor: pointer; border-left: 3px solid transparent; transition: 0.15s; }
        .item-row:hover { background: rgba(255,255,255,0.08); border-left-color: var(--accent); }
        .item-title { font-weight: bold; font-size: 15px; margin-bottom: 4px; }
        .item-epg { font-size: 12px; color: #ff9800; line-height: 1.3; }
        
        .back-btn { background: #475569; color: white; text-align: center; font-weight: bold; }
        
        .pagination-ctrls { display: flex; justify-content: space-between; padding: 10px; background: #0f172a; gap: 10px; }
        .page-btn { padding: 6px 12px; background: #2c2c2e; border: 1px solid #3a3a3c; color: white; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .main-content { flex: 1; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; gap: 20px; }
        .video-wrapper { position: relative; aspect-ratio: 16/9; max-height: 55vh; min-height: 300px; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .h265-container { width: 100%; height: 100%; display: block; background: #000; }
        
        .vod-meta { display: none; gap: 20px; background: var(--sidebar); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .vod-meta.visible { display: flex; }
        .vod-poster { width: 120px; height: 180px; object-fit: cover; border-radius: 6px; background: #2c2c2e; flex-shrink: 0; }
        
        .archive-section { display: none; background: var(--sidebar); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .archive-section.visible { display: block; }
        .archive-controls { display: flex; gap: 8px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
        .archive-btn { padding: 8px 12px; background: #2c2c2e; border: 1px solid #3a3a3c; color: white; border-radius: 6px; cursor: pointer; width: auto; font-size: 12px; }
        .archive-btn:hover { background: var(--accent); color: black; }

        .list-container::-webkit-scrollbar { width: 6px; }
        .list-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="login-box" id="loginBox">
            <input type="text" id="username" placeholder="Потребител">
            <input type="password" id="password" placeholder="Парола">
            <button onclick="loadXtreamData()">Влез и Зареди</button>
            <div id="statusMsg" style="color: #ffa726; font-size: 13px; margin-top: 6px;">Въведете данни.</div>
        </div>
        <div class="tabs">
            <button class="tab-btn active" id="tabLive" onclick="setTab('live')">ТВ</button>
            <button class="tab-btn" id="tabVod" onclick="setTab('vod')">Филми</button>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Търси тук...">
        </div>
        <div class="list-container" id="listContainer"></div>
        <div class="pagination-ctrls" id="paginationBox" style="display: none;">
            <button class="page-btn" id="prevPageBtn" onclick="changePage(-1)">◀ Предишни</button>
            <span id="pageIndicator" style="font-size: 13px; align-self: center; color: var(--muted);">1 / 1</span>
            <button class="page-btn" id="nextPageBtn" onclick="changePage(1)">Следващи ▶</button>
        </div>
    </div>

    <div class="main-content">
        <h2 id="nowPlaying" style="font-weight: 300; font-size: 20px;">Изберете съдържание</h2>
        
        <div class="video-wrapper">
            <div id="h265PlayerContainer" class="h265-container"></div>
        </div>
        
        <div class="vod-meta" id="vodMeta">
            <img id="vodPoster" class="vod-poster" src="" onerror="this.src='https://via.placeholder.com/120x180?text=Няма+Снимка'" />
            <div>
                <h3 id="vodTitle" style="color: var(--accent); margin-bottom: 8px;"></h3>
                <p id="vodPlot" style="font-size: 14px; color: var(--muted); line-height: 1.4;"></p>
            </div>
        </div>

        <div class="archive-section" id="archiveSection">
            <h3 style="color: #ff9800; font-size: 15px;">⏱️ Бързо връщане назад (Таймшифт)</h3>
            <div class="archive-controls">
                <button class="archive-btn" onclick="playArchiveMinutes(5)">-5 мин.</button>
                <button class="archive-btn" onclick="playArchiveMinutes(10)">-10 мин.</button>
                <button class="archive-btn" onclick="playArchiveMinutes(15)">-15 мин.</button>
                <button class="archive-btn" onclick="playArchiveMinutes(30)">-30 мин.</button>
                <button class="archive-btn" onclick="playArchiveMinutes(60)">-1 час</button>
                <button class="archive-btn" onclick="playArchiveMinutes(90)">-1.5 часа</button>
                <button class="archive-btn" onclick="playArchiveMinutes(120)">-2 часа</button>
            </div>
        </div>
    </div>

    <script>
        // ВАЖНО: Променено на https:// заради сигурността на Vercel (Mixed Content)
        const serverUrl = "https://tvpro.burgasnet.com";
        let liveStreams = [], vodStreams = [], vodCategories = [];
        let currentTab = 'live', currentCatId = null;
        let activeItem = null, h265Player = null;
        
        // Пагинация за филмите (по 20 на страница)
        let currentPage = 1;
        const itemsPerPage = 20;

        function setStatus(msg, isError = false) {
            const el = document.getElementById('statusMsg');
            if(el) { el.textContent = msg; el.style.color = isError ? '#ef5350' : '#ffa726'; }
        }

        document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; renderList(); });

        async function loadXtreamData() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass) { setStatus('Попълнете данни!', true); return; }
            setStatus('⏳ Зареждане...');
            try {
                const [liveResp, vodResp, catsResp] = await Promise.all([
                    fetch(`/api/tv?username=${user}&password=${pass}&action=get_live_streams`),
                    fetch(`/api/tv?username=${user}&password=${pass}&action=get_vod_streams`),
                    fetch(`/api/tv?username=${user}&password=${pass}&action=get_vod_categories`)
                ]);
                
                if (!liveResp.ok || !vodResp.ok || !catsResp.ok) throw new Error('Грешка при комуникация.');
                
                liveStreams = await liveResp.json();
                vodStreams = await vodResp.json();
                vodCategories = await catsResp.json();
                
                document.getElementById('loginBox').classList.add('hidden');
                renderList();
            } catch (err) {
                setStatus('❌ Грешка при зареждане', true);
            }
        }

        function setTab(tab) {
            currentTab = tab;
            currentCatId = null;
            currentPage = 1;
            document.getElementById('searchInput').value = '';
            document.getElementById('tabLive').classList.toggle('active', tab === 'live');
            document.getElementById('tabVod').classList.toggle('active', tab === 'vod');
            renderList();
        }

        function renderList() {
            const container = document.getElementById('listContainer');
            const pagBox = document.getElementById('paginationBox');
            container.innerHTML = '';
            pagBox.style.display = 'none';
            
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (currentTab === 'live') {
                let filtered = liveStreams.filter(item => (item.name || '').toLowerCase().includes(search));
                if(!filtered.length) { container.innerHTML = '<div style="color:var(--muted);padding:10px;">Няма канали.</div>'; return; }
                
                filtered.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'item-row';
                    
                    const titleEl = document.createElement('div');
                    titleEl.className = 'item-title';
                    titleEl.textContent = item.name || 'Без име';
                    row.appendChild(titleEl);

                    const epgEl = document.createElement('div');
                    epgEl.className = 'item-epg';
                    epgEl.id = `epg-${item.stream_id}`;
                    epgEl.textContent = 'Зареждане на ТВ Програма...';
                    row.appendChild(epgEl);
                    
                    row.onclick = () => selectItem(item, 'live');
                    container.appendChild(row);

                    // Директно дърпане на програмата под канала
                    fetchInlineEPG(user, pass, item.stream_id, epgEl.id);
                });
            } else {
                // Избор на категории (Папки)
                if (!currentCatId) {
                    let filteredCats = vodCategories.filter(cat => (cat.category_name || '').toLowerCase().includes(search));
                    if(!filteredCats.length) { container.innerHTML = '<div style="color:var(--muted);padding:10px;">Няма категории.</div>'; return; }
                    
                    filteredCats.forEach(cat => {
                        const row = document.createElement('div');
                        row.className = 'item-row';
                        row.innerHTML = `<div class="item-title">📁 ${cat.category_name}</div>`;
                        row.onclick = () => { currentCatId = cat.category_id; currentPage = 1; document.getElementById('searchInput').value = ''; renderList(); };
                        container.appendChild(row);
                    });
                } else {
                    // Избор на филми вътре в папка с лимит до 20 броя на страница
                    const backRow = document.createElement('div');
                    backRow.className = 'item-row back-btn';
                    backRow.textContent = '⬅ НАЗАД КЪМ ПАПКИТЕ';
                    backRow.onclick = () => { currentCatId = null; currentPage = 1; document.getElementById('searchInput').value = ''; renderList(); };
                    container.appendChild(backRow);

                    let catMovies = vodStreams.filter(v => v.category_id == currentCatId);
                    let filtered = catMovies.filter(item => (item.name || item.title || '').toLowerCase().includes(search));
                    
                    if(!filtered.length) { container.innerHTML += '<div style="color:var(--muted);padding:10px;">Папката е празна.</div>'; return; }
                    
                    // Пагинационна логика
                    pagBox.style.display = 'flex';
                    const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
                    document.getElementById('pageIndicator').textContent = `${currentPage} / ${totalPages}`;
                    document.getElementById('prevPageBtn').disabled = (currentPage === 1);
                    document.getElementById('nextPageBtn').disabled = (currentPage === totalPages);

                    const startIdx = (currentPage - 1) * itemsPerPage;
                    const pageItems = filtered.slice(startIdx, startIdx + itemsPerPage);

                    pageItems.forEach(item => {
                        const row = document.createElement('div');
                        row.className = 'item-row';
                        row.innerHTML = `<div class="item-title">🎬 ${item.name || item.title || 'Филм'}</div>`;
                        row.onclick = () => selectItem(item, 'vod');
                        container.appendChild(row);
                    });
                }
            }
        }

        function changePage(dir) {
            currentPage += dir;
            renderList();
        }

        async function fetchInlineEPG(user, pass, streamId, elementId) {
            const el = document.getElementById(elementId);
            try {
                const resp = await fetch(`/api/tv?username=${user}&password=${pass}&action=get_short_epg&stream_id=${streamId}`);
                if (!resp.ok) throw new Error();
                const data = await resp.json();
                if (data && data.epg_listings && data.epg_listings.length > 0) {
                    const now = Math.floor(Date.now() / 1000);
                    let currentProg = data.epg_listings.find(p => now >= parseInt(p.start_timestamp) && now <= parseInt(p.stop_timestamp));
                    if (!currentProg) currentProg = data.epg_listings[0];
                    if (currentProg && currentProg.title) {
                        let t = currentProg.title;
                        try { t = atob(currentProg.title); } catch(e){}
                        const start = currentProg.start ? currentProg.start.split(' ')[1].substring(0,5) : '';
                        el.textContent = `${start ? '['+start+'] ' : ''}${t}`;
                        return;
                    }
                }
                el.textContent = 'В ефир: Стрийм на живо';
            } catch (e) {
                el.textContent = 'Няма налична програма';
            }
        }

        function selectItem(item, type) {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            activeItem = item;
            const name = item.name || item.title || 'Без име';
            document.getElementById('nowPlaying').textContent = name;
            
            document.getElementById('vodMeta').classList.remove('visible');
            document.getElementById('archiveSection').classList.remove('visible');

            if (type === 'live') {
                const url = `${serverUrl}/live/${user}/${pass}/${item.stream_id}.m3u8`;
                playVideo(url);
                if (item.tv_archive === 1) {
                    document.getElementById('archiveSection').classList.add('visible');
                }
            } else {
                document.getElementById('vodMeta').classList.add('visible');
                document.getElementById('vodTitle').textContent = name;
                document.getElementById('vodPoster').src = item.stream_icon || '';
                document.getElementById('vodPlot').textContent = item.plot || 'Няма налично описание.';
                
                const url = `${serverUrl}/movie/${user}/${pass}/${item.stream_id}.ts`;
                playVideo(url);
            }
        }

        function playVideo(url) {
            const h265Box = document.getElementById('h265PlayerContainer');
            if (h265Player) {
                try { h265Player.release(); } catch(e){}
                h265Player = null;
                h265Box.innerHTML = '';
            }

            const config = {
                player: "h265PlayerContainer",
                width: h265Box.clientWidth,
                height: h265Box.clientHeight,
                token: "YOUR_PRO_SDK_TOKEN_IF_REQUIRED",
                extInfo: { moovStart: 0 },
                wasmEngine: "./h265web_wasm.wasm",
                wasmWorker: "./h265web_wasm.js"
            };

            try {
                h265Player = window.H265webjsModule.createPlayer(url, config);
                h265Player.on("load", () => h265Player.play());
                h265Player.on("error", (err) => console.error("Грешка енджин:", err));
            } catch (err) {
                console.error("Критичен отказ на плеъра:", err);
            }
        }

        function playArchiveMinutes(minutesAgo) {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass || !activeItem) return;
            
            const d = new Date(Date.now() - minutesAgo * 60000);
            const f = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ':' + String(d.getHours()).padStart(2,'0') + '-' + String(d.getMinutes()).padStart(2,'0');
            
            const url = `${serverUrl}/timeshift/${user}/${pass}/120/${f}/${activeItem.stream_id}.m3u8`;
            document.getElementById('nowPlaying').textContent = `[АРХИВ -${minutesAgo} мин] ${activeItem.name || 'канал'}`;
            playVideo(url);
        }

        window.addEventListener('resize', () => {
            if (h265Player) {
                const h265Box = document.getElementById('h265PlayerContainer');
                try { h265Player.resize(h265Box.clientWidth, h265Box.clientHeight); } catch(e){}
            }
        });
    </script>
</body>
</html>
