<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Pro - H.265 Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 1000px; }
        .player-wrap { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        #player-container { width: 100%; height: 100%; }
        .controls { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        input, button { padding: 10px 16px; border-radius: 6px; border: none; font-size: 14px; }
        input { flex: 1; background: #1e293b; color: white; border: 1px solid #334155; min-width: 200px; }
        button { background: #00bcd4; color: #000; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.8; transform: scale(0.98); }
        .status { margin-top: 10px; padding: 12px; background: #1e293b; border-radius: 6px; border-left: 3px solid #00bcd4; font-size: 14px; color: #94a3b8; }
        .status.error { border-left-color: #ef5350; color: #ef5350; }
        .status.success { border-left-color: #4caf50; color: #4caf50; }
        .status.loading { border-left-color: #ffa726; color: #ffa726; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="font-weight:300; margin-bottom:15px;">🎬 H.265 Player</h2>
        <div class="player-wrap">
            <div id="player-container"></div>
        </div>
        <div class="controls">
            <input type="text" id="videoUrl" placeholder="URL на видео (.ts, .mkv, .mp4, .m3u8)" value="http://tvpro.burgasnet.com/movie/t1/t1/195.ts">
            <button onclick="loadVideo()">▶ Пусни</button>
            <button onclick="pauseVideo()">⏸ Пауза</button>
            <button onclick="resumeVideo()">▶ Продължи</button>
            <button onclick="stopVideo()">⏹ Спри</button>
        </div>
        <div class="status" id="status">⏳ Зареждане на H.265 плеър...</div>
    </div>

    <!-- ===== КОНФИГУРАЦИЯ ЗА ВСИЧКИ ФАЙЛОВЕ ===== -->
    <script>
        // Указваме пътищата към всички файлове
        window.H265_CONFIG = {
            // Основен WASM
            wasmPath: 'h265web_wasm.wasm',
            wasmJsPath: 'h265web_wasm.js',
            // Допълнителен WASM
            extWasmJsPath: 'extwasm.js',
            extWasmPath: 'extwasm.wasm',
            // Помощни функции
            extJsPath: 'extjs.js',
            // Основен плеър (ще се зареди последен)
            mainJsPath: 'h265web.js'
        };
    </script>

    <!-- ===== ЗАРЕЖДАНЕ НА ФАЙЛОВЕТЕ В ПРАВИЛЕН РЕД ===== -->
    <!-- 1. Помощни функции -->
    <script src="extjs.js"></script>
    
    <!-- 2. WASM обвивки -->
    <script src="extwasm.js"></script>
    <script src="h265web_wasm.js"></script>
    
    <!-- 3. Основен плеър (зависи от всичко по-горе) -->
    <script src="h265web.js"></script>

    <script>
        let player = null;
        let isPlayerReady = false;
        const container = document.getElementById('player-container');
        const status = document.getElementById('status');
        const urlInput = document.getElementById('videoUrl');

        function setStatus(msg, type = '') {
            status.textContent = msg;
            status.className = 'status ' + type;
        }

        function getPlayerClass() {
            // Опитваме различни варианти за глобалния обект
            if (typeof window.H265webjsPlayer !== 'undefined') {
                console.log('✅ Намерен H265webjsPlayer (window)');
                return window.H265webjsPlayer;
            }
            if (typeof window.H265webjs !== 'undefined' && window.H265webjs.Player) {
                console.log('✅ Намерен H265webjs.Player');
                return window.H265webjs.Player;
            }
            if (typeof H265webjsPlayer !== 'undefined') {
                console.log('✅ Намерен H265webjsPlayer (глобален)');
                return H265webjsPlayer;
            }
            return null;
        }

        function checkPlayerLoaded() {
            const Player = getPlayerClass();
            if (Player) {
                console.log('✅ H265web.js зареден успешно');
                setStatus('✅ H.265 плеърът е готов', 'success');
                isPlayerReady = true;
                return true;
            }
            
            // Детайлно логване за дебъг
            console.warn('⚠️ H265web.js НЕ е зареден');
            console.log('Заредени глобални обекти с "h265":', Object.keys(window).filter(k => k.toLowerCase().includes('h265')));
            console.log('Заредени глобални обекти с "wasm":', Object.keys(window).filter(k => k.toLowerCase().includes('wasm')));
            
            setStatus('⚠️ H.265 плеър не е зареден. Проверете файловете в конзолата (F12).', 'error');
            return false;
        }

        function loadVideo() {
            const url = urlInput.value.trim();
            if (!url) {
                setStatus('❌ Моля, въведете URL', 'error');
                return;
            }

            // Унищожаваме стар плеър
            if (player) {
                try {
                    if (typeof player.destroy === 'function') player.destroy();
                    else if (typeof player.release === 'function') player.release();
                    else if (typeof player.stop === 'function') player.stop();
                } catch(e) { console.warn('Грешка при унищожаване:', e); }
                player = null;
            }

            container.innerHTML = '';

            // Проверка дали плеърът е зареден
            if (!isPlayerReady) {
                if (!checkPlayerLoaded()) {
                    // Опитваме се да заредим отново след малко
                    setTimeout(() => {
                        if (checkPlayerLoaded()) {
                            loadVideo();
                        }
                    }, 1000);
                    return;
                }
            }

            const Player = getPlayerClass();
            if (!Player) {
                setStatus('❌ H.265 плеър не е зареден!', 'error');
                return;
            }

            try {
                setStatus('⏳ Зареждане на видео...', 'loading');

                // Създаваме плеъра - опитваме се с различни конфигурации
                let config = {
                    container: container,
                    url: url,
                    autoPlay: true,
                    muted: false,
                    // Използваме WASM за H.265
                    useWasm: true,
                    preferWebCodec: false,
                };

                // Опитваме се да създадем плеъра
                player = new Player(config);

                // Ако плеърът има метод за инициализация
                if (player.init && typeof player.init === 'function') {
                    player.init();
                }

                // Събития (ако плеърът поддържа EventEmitter)
                if (player.on) {
                    player.on('load', () => {
                        setStatus('▶️ Възпроизвеждане', 'success');
                    });
                    player.on('error', (err) => {
                        const msg = err?.message || err || 'Неизвестна грешка';
                        setStatus('❌ Грешка: ' + msg, 'error');
                        console.error('H.265 грешка:', err);
                    });
                    player.on('playing', () => {
                        setStatus('▶️ Възпроизвеждане', 'success');
                    });
                    player.on('pause', () => {
                        setStatus('⏸️ Пауза', '');
                    });
                    player.on('ended', () => {
                        setStatus('🏁 Край на видеото', '');
                    });
                }

                // Ако има метод play, стартираме
                if (typeof player.play === 'function') {
                    player.play();
                }

            } catch(err) {
                setStatus('❌ Грешка при инициализация: ' + err.message, 'error');
                console.error('Грешка при инициализация на H.265 плеъра:', err);
                console.log('Пълен стек:', err.stack);
            }
        }

        function pauseVideo() {
            if (player && typeof player.pause === 'function') {
                player.pause();
            }
        }

        function resumeVideo() {
            if (player && typeof player.play === 'function') {
                player.play();
            }
        }

        function stopVideo() {
            if (player) {
                try {
                    if (typeof player.stop === 'function') player.stop();
                    else if (typeof player.destroy === 'function') player.destroy();
                    else if (typeof player.release === 'function') player.release();
                } catch(e) { console.warn('Грешка при спиране:', e); }
                player = null;
                container.innerHTML = '';
                setStatus('⏹ Спиране', '');
            }
        }

        // ===== АВТОМАТИЧНО ЗАРЕЖДАНЕ ПРИ СТАРТ =====
        let loadAttempts = 0;
        const maxAttempts = 5;

        function tryLoadPlayer() {
            loadAttempts++;
            if (checkPlayerLoaded()) {
                // Автоматично зареждане на примерния URL след 1 секунда
                setTimeout(() => {
                    if (urlInput.value.trim()) {
                        loadVideo();
                    }
                }, 500);
                return true;
            }
            
            if (loadAttempts < maxAttempts) {
                setStatus(`⏳ Опит за зареждане ${loadAttempts}/${maxAttempts}...`, 'loading');
                setTimeout(tryLoadPlayer, 1500);
                return false;
            }
            
            setStatus('❌ Неуспешно зареждане на H.265 плеър след ' + maxAttempts + ' опита. Проверете конзолата.', 'error');
            return false;
        }

        window.addEventListener('load', function() {
            // Изчакваме малко за зареждане на скриптовете
            setTimeout(tryLoadPlayer, 500);
        });

        // ===== Enter за бързо пускане =====
        urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loadVideo();
        });

        console.log('✅ TV Pro - H.265 Player зареден');
        console.log('📁 Очаквани файлове: h265web.js, h265web_wasm.js, h265web_wasm.wasm, extwasm.js, extwasm.wasm, extjs.js');
    </script>
</body>
</html>
